linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - gofmt
    - goimports
    - revive
    - bodyclose
    - gocritic
    - wrapcheck

linters-settings:
  wrapcheck:
    ignorePackageGlobs:
      - "github.com/AitorConS/unikernel-engine/*"
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers

issues:
  max-same-issues: 0
  exclude-rules:
    - path: "_test.go"
      linters:
        - wrapcheck
        - errcheck
