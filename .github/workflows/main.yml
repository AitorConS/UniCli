name: Main Branch

on:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run unit tests
        run: go test ./cmd/... ./internal/... ./pkg/... -race -coverprofile=coverage.out -covermode=atomic

  kernel-build:
    name: Kernel Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-multilib nasm qemu-utils

      - name: Build kernel and mkfs
        run: make kernel && make -C kernel tools

      - name: Stage mkfs for release
        run: |
          mkdir -p dist
          test -f kernel/output/tools/bin/mkfs || (echo "ERROR: mkfs not built" && exit 1)
          cp kernel/output/tools/bin/mkfs dist/mkfs-linux-amd64
          chmod +x dist/mkfs-linux-amd64
          file dist/mkfs-linux-amd64

      - name: Upload mkfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkfs-linux-amd64
          path: dist/mkfs-linux-amd64

  e2e-tests:
    name: E2E Tests
    if: true  # TODO: enable when self-hosted KVM runner is configured
    runs-on: [self-hosted, linux, kvm]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Check KVM
        run: |
          test -e /dev/kvm || (echo "/dev/kvm not found" && exit 1)
          test -r /dev/kvm && test -w /dev/kvm || (echo "Add runner user to kvm group: sudo usermod -aG kvm \$USER" && exit 1)

      - name: Build kernel and tools
        run: make kernel && make -C kernel tools

      - name: Run E2E tests
        run: make e2e

  build-release:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, kernel-build]  # swap needs to [e2e-tests] when KVM runner ready
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build uni
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.sha }}" \
            -o dist/uni-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/uni

      - name: Build unid
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.sha }}" \
            -o dist/unid-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/unid

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, kernel-build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: dist/
          merge-multiple: true

      - name: Download mkfs artifact
        uses: actions/download-artifact@v4
        with:
          name: mkfs-linux-amd64
          path: dist/

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest dist/* \
            --title "latest ($(git rev-parse --short HEAD))" \
            --notes "Built from commit ${{ github.sha }} on $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --prerelease

  kernel-artifact:
    name: Kernel Image Artifact
    runs-on: ubuntu-latest
    needs: kernel-build
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-multilib nasm qemu-utils

      - name: Build kernel
        run: make kernel

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-${{ github.sha }}
          path: kernel/build/

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Generate coverage
        run: |
          go test ./cmd/... ./internal/... ./pkg/... -coverprofile=coverage.out -covermode=atomic

      - name: HTML report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage.html
