name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC daily
  workflow_dispatch:      # allow manual trigger

jobs:
  kernel-tests:
    name: Full Kernel Test Suite
    runs-on: [self-hosted, linux, kvm]
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-multilib nasm qemu-system-x86

      - name: Enable KVM
        run: |
          sudo modprobe kvm-intel || sudo modprobe kvm-amd || true
          sudo chmod 666 /dev/kvm

      - name: Build kernel
        run: make kernel

      - name: Run kernel test suite
        run: make test-kernel

  benchmarks:
    name: Benchmark Suite
    runs-on: [self-hosted, linux, kvm]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run benchmarks
        run: go test ./... -bench=. -benchmem -benchtime=5s | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: benchmark-results.txt

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [kernel-tests, benchmarks, security-scan]
    if: failure()
    steps:
      - name: Notify
        # TODO: configure NOTIFY_WEBHOOK secret in repo settings
        # Supports Discord or Slack — set NOTIFY_TYPE to "discord" or "slack"
        env:
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
          NOTIFY_TYPE: ${{ vars.NOTIFY_TYPE }}  # "discord" or "slack"
        run: |
          PAYLOAD="{\"content\": \"🔴 Nightly CI failed on \`main\`. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          if [ "$NOTIFY_TYPE" = "slack" ]; then
            PAYLOAD="{\"text\": \"🔴 Nightly CI failed on \`main\`. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
          curl -s -X POST "$NOTIFY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
